<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 360px;
            background: #1e293b;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .icon {
            font-size: 50px;
            margin-bottom: 15px;
        }
        h2 {
            font-size: 20px;
            margin-bottom: 10px;
        }
        p {
            color: #94a3b8;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #38bdf8, #2563eb);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
        }
        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">🔐</div>
        <h2>Device Verification</h2>
        <p>Click the button below to secure your account and verify your device network.</p>
        <button class="btn" onclick="submitData()">Verify & Continue</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function submitData() {
            // অফলাইন সিকিউরিটি: ফোনের টাইমজোন দিয়ে প্রক্সি/ভিপিএন চেক
            const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "Asia/Dhaka";
            
            if (tz.includes("America") || tz.includes("Europe") || tz.includes("Pacific")) {
                alert("VPN or Proxy is detected! Please turn off your VPN and try again.");
                return;
            }

            // কোনো এক্সটার্নাল লাইব্রেরি ছাড়া ব্রাউজার প্রোপার্টি দিয়ে ইউনিক আইডি তৈরি
            const screenInfo = window.screen.width + "x" + window.screen.height;
            const coreInfo = navigator.hardwareConcurrency || 4;
            const generatedID = "ID-" + btoa(screenInfo + "-" + coreInfo).substring(0, 10).toUpperCase();

            const payload = {
                status: "VERIFIED",
                device_id: generatedID,
                ip: "Secure_Local",
                country: "Local"
            };

            // সরাসরি বটের ব্যাকঅ্যান্ডে ডাটা পাঠানো
            tg.sendData(JSON.stringify(payload));
            
            setTimeout(() => {
                tg.close();
            }, 300);
        }
    </script>
</body>
</html>
